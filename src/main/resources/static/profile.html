<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — HRMS</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* ── Completion bar ── */
        .completion-bar-wrap {
            background: var(--bg-card-alt);
            border-radius: 100px;
            height: 8px;
            overflow: hidden;
            margin-top: 0.5rem;
        }
        .completion-bar-fill {
            height: 100%;
            border-radius: 100px;
            background: var(--accent-green);
            transition: width 0.6s cubic-bezier(0.16,1,0.3,1);
        }

        /* ── Profile header card ── */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .profile-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--text-primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            flex-shrink: 0;
        }
        .profile-header-info h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }
        .profile-header-info p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin: 0;
        }

        /* ── Section label ── */
        .section-label {
            font-family: 'Syne', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1.125rem;
            letter-spacing: -0.01em;
        }

        /* ── Missing fields ── */
        .missing-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.625rem;
        }
        .chip {
            background: var(--accent-pink);
            color: #8B1A1A;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 0.25rem 0.625rem;
            border-radius: 100px;
        }

        /* ── Complete badge ── */
        .badge-complete {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            background: var(--accent-green);
            color: #1A4A1A;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 0.3rem 0.75rem;
            border-radius: 100px;
        }

        /* ── Read-only badge ── */
        .readonly-note {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-left: 0.375rem;
            font-weight: 400;
            text-transform: none;
            letter-spacing: 0;
        }

        /* ── Resume section ── */
        .resume-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .resume-filename {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }
        .resume-filename svg { flex-shrink: 0; }

        /* ── Grid for form ── */
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem 1.25rem;
        }
        .profile-grid .full-width { grid-column: 1 / -1; }

        @media (max-width: 620px) {
            .profile-grid { grid-template-columns: 1fr; }
            .profile-grid .full-width { grid-column: 1; }
            .profile-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
        }

        /* ── Divider ── */
        .section-divider {
            height: 1px;
            background: var(--border);
            margin: 1.75rem 0;
        }

        .btn-group { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 0.25rem; }
    </style>
</head>
<body class="app-page">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">HR<span>MS</span></div>
        <nav class="sidebar-nav" id="sidebarNav">
            <!-- filled by JS based on role -->
        </nav>
        <div class="sidebar-user">
            <div class="sidebar-user-avatar" id="sidebarAvatar">—</div>
            <div class="sidebar-user-info">
                <div class="sidebar-user-name" id="sidebarUsername">Loading...</div>
                <div class="sidebar-user-role" id="sidebarRole">—</div>
            </div>
            <button class="sidebar-logout-btn" onclick="logout()" title="Logout">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
        </div>
    </aside>

    <!-- ===== MAIN ===== -->
    <main class="main-content">

        <div class="page-header">
            <div class="page-header-left">
                <h1>My Profile</h1>
                <span class="page-breadcrumb" id="breadcrumbBack">← Back to Dashboard</span>
            </div>
        </div>

        <div id="alertContainer"></div>

        <!-- Skeleton / loading state -->
        <div id="loadingState" style="text-align:center; padding:3rem; color:var(--text-muted);">
            Loading profile...
        </div>

        <!-- Profile content (hidden until loaded) -->
        <div id="profileContent" style="display:none; max-width: 860px;">

            <!-- Completion card -->
            <div class="card" style="margin-bottom:1.25rem;">
                <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem;">
                    <div style="flex:1; min-width:200px;">
                        <div style="display:flex; align-items:center; gap:0.75rem; margin-bottom:0.375rem;">
                            <span class="section-label" style="margin-bottom:0;">Profile Completion</span>
                            <span id="completionBadge" style="font-size:0.9rem; font-weight:700; color:var(--text-primary);">0%</span>
                        </div>
                        <div class="completion-bar-wrap">
                            <div class="completion-bar-fill" id="completionBar" style="width:0%"></div>
                        </div>
                    </div>
                    <div id="completionStatus"></div>
                </div>
                <div id="missingFieldsWrap" style="margin-top:0.875rem; display:none;">
                    <span style="font-size:0.78rem; font-weight:600; text-transform:uppercase; letter-spacing:0.04em; color:var(--text-secondary);">Missing:</span>
                    <div class="missing-chips" id="missingChips"></div>
                </div>
            </div>

            <!-- Profile header -->
            <div class="card" style="margin-bottom:1.25rem;">
                <div class="profile-header">
                    <div class="profile-avatar" id="profileAvatar">—</div>
                    <div class="profile-header-info">
                        <h2 id="profileFullName">—</h2>
                        <p id="profileEmail">—</p>
                        <p id="profileMeta" style="margin-top:0.2rem;"></p>
                    </div>
                </div>
            </div>

            <!-- Edit form -->
            <div class="card">
                <div class="section-label">Personal &amp; Work Details</div>

                <div class="profile-grid">
                    <!-- First Name (editable) -->
                    <div class="form-group">
                        <label for="fieldFirstName">First Name <span style="color:var(--danger)">*</span></label>
                        <input type="text" id="fieldFirstName" placeholder="First name" required>
                    </div>
                    <!-- Middle Name (optional) -->
                    <div class="form-group">
                        <label for="fieldMiddleName">Middle Name <span class="readonly-note">(optional)</span></label>
                        <input type="text" id="fieldMiddleName" placeholder="Middle name">
                    </div>
                    <!-- Last Name (editable) -->
                    <div class="form-group">
                        <label for="fieldLastName">Last Name <span style="color:var(--danger)">*</span></label>
                        <input type="text" id="fieldLastName" placeholder="Last name" required>
                    </div>
                    <!-- Email (read-only) -->
                    <div class="form-group">
                        <label for="fieldEmail">Email <span class="readonly-note">(read-only)</span></label>
                        <input type="email" id="fieldEmail" readonly style="opacity:0.65; cursor:not-allowed;">
                    </div>

                    <!-- Phone -->
                    <div class="form-group">
                        <label for="fieldPhone">Phone Number</label>
                        <input type="tel" id="fieldPhone" placeholder="+91 98765 43210">
                    </div>
                    <!-- Gender -->
                    <div class="form-group">
                        <label for="fieldGender">Gender</label>
                        <select id="fieldGender">
                            <option value="">— Select —</option>
                            <option value="MALE">Male</option>
                            <option value="FEMALE">Female</option>
                            <option value="OTHER">Other</option>
                        </select>
                    </div>

                    <!-- DOB -->
                    <div class="form-group">
                        <label for="fieldDob">Date of Birth</label>
                        <input type="date" id="fieldDob">
                    </div>
                    <!-- Blood Group -->
                    <div class="form-group">
                        <label for="fieldBloodGroup">Blood Group</label>
                        <select id="fieldBloodGroup">
                            <option value="">— Select —</option>
                            <option value="A+">A+</option><option value="A-">A-</option>
                            <option value="B+">B+</option><option value="B-">B-</option>
                            <option value="AB+">AB+</option><option value="AB-">AB-</option>
                            <option value="O+">O+</option><option value="O-">O-</option>
                        </select>
                    </div>

                    <!-- Department -->
                    <div class="form-group">
                        <label for="fieldDepartment">Department</label>
                        <input type="text" id="fieldDepartment" placeholder="e.g. Engineering">
                    </div>
                    <!-- Designation -->
                    <div class="form-group">
                        <label for="fieldDesignation">Designation</label>
                        <input type="text" id="fieldDesignation" placeholder="e.g. Software Engineer">
                    </div>

                    <!-- Address -->
                    <div class="form-group full-width">
                        <label for="fieldAddress">Address</label>
                        <input type="text" id="fieldAddress" placeholder="Full address">
                    </div>
                </div>

                <div class="btn-group">
                    <button id="saveBtn" onclick="saveProfile()">
                        <span id="saveText">Save Profile</span>
                        <span id="saveSpinner" class="spinner" style="display:none;"></span>
                    </button>
                </div>

                <div class="section-divider"></div>

                <!-- Resume -->
                <div class="section-label">Resume / CV</div>
                <div class="resume-row">
                    <div id="resumeStatus" class="resume-filename"></div>
                    <label for="resumeInput" id="resumeLabel" style="cursor:pointer; display:inline-flex; align-items:center; gap:0.5rem;">
                        <button type="button" onclick="document.getElementById('resumeInput').click()" id="resumeBtn">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                            Upload Resume
                        </button>
                    </label>
                    <input type="file" id="resumeInput" accept=".pdf" style="display:none;" onchange="uploadResume(this)">
                    <button type="button" id="downloadResumeBtn" class="btn-secondary" onclick="downloadResume()" style="display:none;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Download
                    </button>
                </div>
                <p style="font-size:0.78rem; color:var(--text-muted); margin-top:0.625rem;">PDF only, max 5MB</p>
            </div>

        </div>
    </main>

    <script src="/js/auth.js"></script>
    <script>
        let currentUser = null;

        // Sidebar nav templates
        const HR_NAV = `
            <a href="/hr-dashboard.html" class="sidebar-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                Dashboard
            </a>
            <a href="/employees.html" class="sidebar-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                Employees
            </a>
            <a href="/dashboard.html" class="sidebar-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                Approvals
            </a>
            <a href="/manage-leaves.html" class="sidebar-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                Leave Requests
            </a>
            <a href="/new-employees.html" class="sidebar-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                New Hires
            </a>
            <a href="/profile.html" class="sidebar-nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                My Profile
            </a>`;

        const EMP_NAV = `
            <a href="/employee-dashboard.html" class="sidebar-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                Dashboard
            </a>
            <a href="/employee-dashboard.html#tasks-section" class="sidebar-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                My Tasks
            </a>
            <a href="/employee-dashboard.html#leave-section" class="sidebar-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                Leave
            </a>
            <a href="/employee-dashboard.html#payslip-section" class="sidebar-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                My Payslip
            </a>
            <a href="/profile.html" class="sidebar-nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                My Profile
            </a>`;

        async function init() {
            currentUser = await requireAuth();
            if (!currentUser) return;

            // Build sidebar
            document.getElementById('sidebarNav').innerHTML =
                currentUser.role === 'HR' ? HR_NAV : EMP_NAV;
            document.getElementById('sidebarUsername').textContent = currentUser.username;
            document.getElementById('sidebarAvatar').textContent =
                currentUser.username.substring(0, 2).toUpperCase();
            document.getElementById('sidebarRole').textContent =
                currentUser.role === 'HR' ? 'HR Manager' : 'Employee';

            // Breadcrumb back link
            const back = document.getElementById('breadcrumbBack');
            back.style.cursor = 'pointer';
            back.onclick = () => {
                window.location.href = currentUser.role === 'HR'
                    ? '/hr-dashboard.html' : '/employee-dashboard.html';
            };

            await loadProfile();
        }

        async function loadProfile() {
            try {
                const res = await fetch('/api/profile/me', {
                    credentials: 'include'
                });

                if (res.status === 401) { logout(); return; }
                if (!res.ok) throw new Error('Failed to load profile');

                const data = await res.json();
                renderProfile(data);

            } catch (err) {
                document.getElementById('loadingState').textContent = 'Failed to load profile. Please refresh.';
                console.error(err);
            }
        }

        function renderProfile(d) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('profileContent').style.display = '';

            // Completion
            const pct = d.completion_percentage || 0;
            document.getElementById('completionBadge').textContent = pct + '%';
            document.getElementById('completionBar').style.width = pct + '%';
            document.getElementById('completionBar').style.background =
                pct === 100 ? 'var(--accent-green)' : pct >= 60 ? 'var(--accent-yellow)' : 'var(--accent-pink)';

            if (pct === 100) {
                document.getElementById('completionStatus').innerHTML =
                    '<span class="badge-complete">✓ Complete</span>';
            } else {
                document.getElementById('completionStatus').innerHTML = '';
            }

            const missing = d.missing_fields || [];
            if (missing.length > 0) {
                document.getElementById('missingFieldsWrap').style.display = '';
                document.getElementById('missingChips').innerHTML =
                    missing.map(f => `<span class="chip">${f}</span>`).join('');
            } else {
                document.getElementById('missingFieldsWrap').style.display = 'none';
            }

            // Header
            const fullName = d.full_name || [d.first_name, d.middle_name, d.last_name].filter(Boolean).join(' ') || d.username || '—';
            document.getElementById('profileFullName').textContent = fullName || '—';
            document.getElementById('profileEmail').textContent = d.email || d.username || '—';
            document.getElementById('profileAvatar').textContent =
                (fullName && fullName !== '—') ? fullName.substring(0, 2).toUpperCase() : '?';

            const meta = [d.designation, d.department].filter(Boolean).join(' · ');
            document.getElementById('profileMeta').textContent = meta;

            // Populate all fields — use empty string for null/undefined so inputs clear correctly
            setFieldValue('fieldFirstName',  d.first_name  || '');
            setFieldValue('fieldMiddleName', d.middle_name !== null && d.middle_name !== undefined ? d.middle_name : '');
            setFieldValue('fieldLastName',   d.last_name   || '');
            setFieldValue('fieldEmail',      d.email       || d.username || '');
            setFieldValue('fieldPhone',      d.phone       || '');
            setFieldValue('fieldAddress',    d.address     || '');
            setFieldValue('fieldDob',        d.dob         || '');
            setFieldValue('fieldBloodGroup', d.blood_group || '');
            setFieldValue('fieldDepartment', d.department  || '');
            setFieldValue('fieldDesignation',d.designation || '');
            if (d.gender) {
                document.getElementById('fieldGender').value = d.gender;
            } else {
                document.getElementById('fieldGender').value = '';
            }

            // Resume
            const resumeStatus = document.getElementById('resumeStatus');
            const dlBtn = document.getElementById('downloadResumeBtn');
            if (d.resume_path) {
                resumeStatus.innerHTML = `
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent-green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    Resume uploaded`;
                resumeStatus.style.color = 'var(--success)';
                dlBtn.style.display = 'inline-flex';
            } else {
                resumeStatus.textContent = 'No resume uploaded';
                dlBtn.style.display = 'none';
            }
        }

        function setFieldValue(id, val) {
            const el = document.getElementById(id);
            if (el) el.value = (val !== null && val !== undefined) ? val : '';
        }

        async function saveProfile() {
            const firstNameVal = document.getElementById('fieldFirstName').value.trim();
            const lastNameVal  = document.getElementById('fieldLastName').value.trim();

            if (!firstNameVal) {
                showAlert('First name is required.', 'error');
                document.getElementById('fieldFirstName').focus();
                return;
            }
            if (!lastNameVal) {
                showAlert('Last name is required.', 'error');
                document.getElementById('fieldLastName').focus();
                return;
            }

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            document.getElementById('saveText').textContent = 'Saving...';
            document.getElementById('saveSpinner').style.display = 'inline-block';

            const payload = {
                firstName:   firstNameVal,
                middleName:  document.getElementById('fieldMiddleName').value.trim() || '',
                lastName:    lastNameVal,
                phone:       document.getElementById('fieldPhone').value.trim() || null,
                address:     document.getElementById('fieldAddress').value.trim() || null,
                dob:         document.getElementById('fieldDob').value || null,
                bloodGroup:  document.getElementById('fieldBloodGroup').value || null,
                department:  document.getElementById('fieldDepartment').value.trim() || null,
                designation: document.getElementById('fieldDesignation').value.trim() || null,
                gender:      document.getElementById('fieldGender').value || null
            };

            try {
                const res = await fetch('/api/profile/me', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(payload)
                });

                if (res.status === 401) { logout(); return; }

                if (res.ok) {
                    const data = await res.json();
                    renderProfile(data);
                    showAlert('Profile saved successfully!', 'success');
                } else {
                    const err = await res.json().catch(() => ({}));
                    showAlert(err.message || 'Failed to save profile.', 'error');
                }
            } catch (err) {
                showAlert('Network error. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                document.getElementById('saveText').textContent = 'Save Profile';
                document.getElementById('saveSpinner').style.display = 'none';
            }
        }

        async function uploadResume(input) {
            const file = input.files[0];
            if (!file) return;
            if (!file.name.toLowerCase().endsWith('.pdf')) {
                showAlert('Only PDF files are allowed.', 'error');
                input.value = '';
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                showAlert('File must be under 5MB.', 'error');
                input.value = '';
                return;
            }

            const btn = document.getElementById('resumeBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner" style="width:14px;height:14px;"></span> Uploading...';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/api/profile/resume', {
                    method: 'POST',
                    credentials: 'include',
                    body: formData
                });

                if (res.ok) {
                    const data = await res.json();
                    renderProfile(data);
                    showAlert('Resume uploaded successfully!', 'success');
                } else {
                    const err = await res.json().catch(() => ({}));
                    showAlert(err.message || 'Upload failed.', 'error');
                }
            } catch (err) {
                showAlert('Network error. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> Upload Resume`;
                input.value = '';
            }
        }

        function downloadResume() {
            window.open('/api/profile/resume/download', '_blank');
        }

        init();
    </script>
</body>
</html>
