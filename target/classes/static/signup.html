<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — HRMS</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body.auth-page {
            align-items: flex-start !important;
            padding: 2rem 1rem;
            overflow-y: auto;
        }
        .auth-wrapper {
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            padding: 1.5rem;
        }
        .auth-card {
            padding: 2rem 2.25rem 2.25rem;
        }
        .auth-card h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
        .auth-card > p { margin-bottom: 1.5rem; font-size: 0.85rem; }
        .form-group { margin-bottom: 1rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.875rem; }
        .req { color: var(--danger); }
        .signup-submit { width: 100%; margin-top: 1.25rem; padding: 0.875rem 1.5rem; }
        @media (max-width: 500px) {
            body.auth-page { padding: 1rem 0.5rem; }
            .auth-card { padding: 1.5rem 1.25rem; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="auth-page">
    <div class="auth-wrapper">
        <div class="auth-brand">
            <div class="auth-brand-logo">HR<span>MS</span></div>
        </div>
        <div class="auth-card">
            <h1>Create account</h1>
            <p>Register for HRMS. Your account will need HR approval before access.</p>
            <div id="alertContainer"></div>
            <form id="signupForm" novalidate>
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name <span class="req">*</span></label>
                        <input type="text" id="firstName" required placeholder="First name" autocomplete="given-name">
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name <span class="req">*</span></label>
                        <input type="text" id="lastName" required placeholder="Last name" autocomplete="family-name">
                    </div>
                </div>
                <div class="form-group">
                    <label for="username">Username <span class="req">*</span></label>
                    <input type="text" id="username" required minlength="3" placeholder="Choose a username" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="email">Email <span class="req">*</span></label>
                    <input type="email" id="email" required placeholder="your@email.com" autocomplete="email">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Password <span class="req">*</span></label>
                        <input type="password" id="password" required minlength="6" placeholder="Min. 6 characters" autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password <span class="req">*</span></label>
                        <input type="password" id="confirmPassword" required minlength="6" placeholder="Repeat password" autocomplete="new-password">
                    </div>
                </div>
                <button type="submit" id="signupBtn" class="signup-submit">
                    <span id="signupText">Create Account</span>
                    <span id="signupSpinner" class="spinner" style="display:none;"></span>
                </button>
            </form>
            <p style="text-align:center; font-size:0.85rem; margin-top:1.25rem; margin-bottom:0;">
                Already have an account? <a href="/index.html" class="link">Sign in here</a>
            </p>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        requireGuest();

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const firstName       = document.getElementById('firstName').value.trim();
            const lastName        = document.getElementById('lastName').value.trim();
            const username        = document.getElementById('username').value.trim();
            const email           = document.getElementById('email').value.trim();
            const password        = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!firstName)                          { showAlert('First name is required.', 'error'); return; }
            if (!lastName)                           { showAlert('Last name is required.', 'error'); return; }
            if (!username || username.length < 3)    { showAlert('Username must be at least 3 characters.', 'error'); return; }
            if (!email)                              { showAlert('Email is required.', 'error'); return; }
            if (!password || password.length < 6)   { showAlert('Password must be at least 6 characters.', 'error'); return; }
            if (password !== confirmPassword)        { showAlert('Passwords do not match.', 'error'); return; }

            setLoading(true);

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ firstName, lastName, username, email, password, confirmPassword, role: 'EMPLOYEE' })
                });

                if (res.ok) {
                    showAlert('Account created! Awaiting HR approval. Redirecting...', 'success');
                    setTimeout(() => { window.location.href = '/index.html'; }, 2200);
                } else {
                    const err = await res.json().catch(() => ({}));
                    showAlert(err.message || 'Registration failed. Please try again.', 'error');
                    setLoading(false);
                }
            } catch (err) {
                showAlert('Network error. Please try again.', 'error');
                setLoading(false);
            }
        });

        function setLoading(on) {
            document.getElementById('signupBtn').disabled = on;
            document.getElementById('signupText').textContent = on ? 'Creating account...' : 'Create Account';
            document.getElementById('signupSpinner').style.display = on ? 'inline-block' : 'none';
        }
    </script>
</body>
</html>
