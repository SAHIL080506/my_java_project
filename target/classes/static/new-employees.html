<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Employees — HRMS</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="app-page">

    <aside class="sidebar">
        <div class="sidebar-brand">HR<span>MS</span></div>
        <nav class="sidebar-nav">
            <a href="/hr-dashboard.html" class="sidebar-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                Dashboard
            </a>
            <a href="/employees.html" class="sidebar-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                Employees
            </a>
            <a href="/dashboard.html" class="sidebar-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                Approvals
            </a>
            <a href="/manage-leaves.html" class="sidebar-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                Leave Requests
            </a>
            <a href="/new-employees.html" class="sidebar-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                New Hires
            </a>
            <a href="/profile.html" class="sidebar-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                My Profile
            </a>
        </nav>
        <div class="sidebar-user">
            <div class="sidebar-user-avatar" id="sidebarAvatar">—</div>
            <div class="sidebar-user-info">
                <div class="sidebar-user-name" id="sidebarUsername">Loading...</div>
                <div class="sidebar-user-role">HR Manager</div>
            </div>
            <button class="sidebar-logout-btn" onclick="logout()" title="Logout">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
        </div>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <div class="page-header-left">
                <h1>New Employees</h1>
                <a href="/hr-dashboard.html" class="page-breadcrumb">← Back to Dashboard</a>
            </div>
            <div class="page-header-actions">
                <button onclick="window.location.href='/add-employee.html'" style="gap:0.375rem;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add Employee
                </button>
            </div>
        </div>

        <!-- Month header card -->
        <div class="card" style="margin-bottom:1rem; background:linear-gradient(135deg,#141414 0%,#2A2A2A 100%); color:#fff;">
            <div style="display:flex; align-items:center; justify-content:space-between;">
                <div>
                    <div style="font-size:0.72rem; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.25rem;">This Month</div>
                    <div style="font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:800; letter-spacing:-0.02em;" id="monthTitle">Loading...</div>
                </div>
                <div style="text-align:right;">
                    <div style="font-family:'Syne',sans-serif; font-size:3rem; font-weight:800; letter-spacing:-0.04em; line-height:1;" id="newEmpCount">—</div>
                    <div style="font-size:0.78rem; color:rgba(255,255,255,0.5);">new hires</div>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="card" style="padding:0; overflow:hidden;">
            <div id="loading" class="empty-state"><div class="empty-state-icon">⏳</div><p>Loading new employees...</p></div>
            <div id="emptyState" class="empty-state" style="display:none;">
                <div class="empty-state-icon">🎉</div>
                <p>No new employees joined this month yet.</p>
                <button onclick="window.location.href='/add-employee.html'" style="width:auto; margin-top:1.25rem;">Add First Employee</button>
            </div>
            <div id="tableContainer" class="table-container" style="display:none; border-radius:var(--radius-lg); border:none;">
                <table>
                    <thead>
                        <tr>
                            <th>Employee</th>
                            <th>Designation</th>
                            <th>Department</th>
                            <th>Joined On</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="newEmpTableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="/js/auth.js"></script>
    <script>
        async function init() {
            const user = await requireAuth('HR');
            if (!user) return;
            document.getElementById('sidebarUsername').textContent = user.username;
            document.getElementById('sidebarAvatar').textContent = user.username.substring(0, 2).toUpperCase();

            const now = new Date();
            document.getElementById('monthTitle').textContent = now.toLocaleString('default', { month: 'long', year: 'numeric' });

            await loadNewEmployees();
        }

        async function loadNewEmployees() {
            const loading = document.getElementById('loading');
            const emptyState = document.getElementById('emptyState');
            const tableContainer = document.getElementById('tableContainer');
            const tbody = document.getElementById('newEmpTableBody');
            const countEl = document.getElementById('newEmpCount');

            try {
                const res = await fetch('/api/hr/employees/new-this-month', { credentials: 'include' });
                loading.style.display = 'none';

                if (!res.ok) { emptyState.style.display = 'block'; return; }

                const employees = await res.json();
                countEl.textContent = employees.length;

                if (!employees.length) { emptyState.style.display = 'block'; return; }

                tableContainer.style.display = 'block';
                const colors = ['#7ABCB8','#7CB87A','#E8D87A','#B0C0D0','#E8A0A0'];

                tbody.innerHTML = employees.map((emp, i) => {
                    const initials = (emp.fullName || '?').split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
                    const daysAgo = Math.floor((Date.now() - new Date(emp.joiningDate).getTime()) / 86400000);
                    const joinLabel = daysAgo === 0 ? 'Today!' : daysAgo === 1 ? 'Yesterday' : `${daysAgo} days ago`;

                    return `
                    <tr>
                        <td>
                            <div class="emp-cell">
                                <div class="emp-avatar" style="background:${colors[i % colors.length]};">${initials}</div>
                                <div>
                                    <div class="emp-name">${escHtml(emp.fullName)}</div>
                                    <div class="emp-email">${escHtml(emp.email || '—')}</div>
                                </div>
                            </div>
                        </td>
                        <td>${escHtml(emp.designation || '—')}</td>
                        <td>${escHtml(emp.department || '—')}</td>
                        <td>
                            <div style="font-size:0.82rem;">${formatDate(emp.joiningDate)}</div>
                            <div style="font-size:0.7rem; color:var(--accent-green); font-weight:600;">${joinLabel}</div>
                        </td>
                        <td>
                            <button class="btn-sm btn-outline" onclick="window.location.href='/employees.html'">View All Employees</button>
                        </td>
                    </tr>`;
                }).join('');
            } catch (e) {
                console.error(e);
                loading.style.display = 'none';
                showAlert('Failed to load new employees.', 'error');
            }
        }

        function formatDate(d) {
            if (!d) return '—';
            return new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        }
        function escHtml(s) {
            if (!s) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        init();
    </script>
</body>
</html>
